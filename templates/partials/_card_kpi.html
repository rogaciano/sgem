{# Partial: _card_kpi.html
   Uso: {% include 'partials/_card_kpi.html' with icon='...' label='Total' value='42' color='orange' %}
#}
<div class="bg-gray-900 border border-white/10 rounded-2xl p-5 hover:border-{{ color }}-500/30 transition-all duration-200 group">
    <div class="flex items-start justify-between mb-4">
        <div class="w-11 h-11 rounded-xl bg-{{ color }}-500/15 border border-{{ color }}-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">
            {{ icon|safe }}
        </div>
        {% if badge %}
        <span class="text-xs px-2 py-0.5 rounded-full bg-{{ color }}-500/20 text-{{ color }}-400 font-medium">{{ badge }}</span>
        {% endif %}
    </div>
    <p class="text-2xl font-bold text-white">{{ value }}</p>
    <p class="text-sm text-gray-500 mt-0.5">{{ label }}</p>
</div>
