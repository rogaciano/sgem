<div x-data="{ open: false }" class="mb-6">
    <button @click="open = !open"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-800 border border-white/10 text-sm text-gray-300 hover:text-white transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
        </svg>
        Filtros
        <svg class="w-3.5 h-3.5 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <div x-show="open" x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
         class="mt-3 bg-gray-900 border border-white/10 rounded-2xl p-5">
        <form method="get" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            {% for field in filter.form %}
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">{{ field.label }}</label>
                <div>{{ field }}</div>
            </div>
            {% endfor %}
            <div class="flex items-end gap-2 col-span-2 md:col-span-4">
                <button type="submit"
                    class="px-4 py-2 rounded-xl bg-orange-600 hover:bg-orange-700 text-white text-sm font-medium transition">
                    Filtrar
                </button>
                <a href="?"
                    class="px-4 py-2 rounded-xl bg-gray-700 hover:bg-gray-600 text-white text-sm font-medium transition">
                    Limpar
                </a>
            </div>
        </form>
    </div>
</div>
