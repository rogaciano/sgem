<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SGEM Caruaru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-gray-950 flex items-center justify-center">

<div class="w-full max-w-sm px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-400 to-red-600 mb-4">
            <span class="text-white font-bold text-2xl">C</span>
        </div>
        <h1 class="text-2xl font-bold text-white">SGEM</h1>
        <p class="text-sm text-gray-500 mt-1">Sistema de Gestão de Eventos Musicais</p>
        <p class="text-xs text-gray-600 mt-0.5">Prefeitura de Caruaru · PE</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-white/10 rounded-2xl p-8">
        <h2 class="text-lg font-semibold text-white mb-6">Entrar no sistema</h2>

        {% if form.errors %}
        <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/20 text-red-400 border border-red-500/30 text-sm">
            Usuário ou senha incorretos. Tente novamente.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Usuário</label>
                <input type="text" name="username" autofocus required
                    class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition-all"
                    placeholder="seu.usuario">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Senha</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-400 hover:to-red-500 text-white font-semibold py-2.5 rounded-xl text-sm transition-all duration-150 mt-2">
                Entrar
            </button>
        </form>
    </div>

    <p class="text-center text-xs text-gray-700 mt-6">
        Acesso restrito a servidores autorizados
    </p>
</div>

</body>
</html>
